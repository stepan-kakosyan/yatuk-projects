name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yatuk-apps:latest

      - name: Create .env for CI
        run: |
          cat <<EOF > .env
          DATABASE_NAME=test_db
          DATABASE_USER=test_user
          DATABASE_PASSWORD=test_pass
          DATABASE_HOST=127.0.0.1
          DATABASE_PORT=3306
          SECRET_KEY=django-insecure-test
          BANK_URL=https://dummy-bank-url
          BANK_USERNAME=dummy
          BANK_PASSWORD=dummy
          BANK_CLIENT_ID=dummy
          EMAIL_HOST=smtp.example.com
          EMAIL_PORT=587
          EMAIL_HOST_USER=test@example.com
          EMAIL_HOST_PASSWORD=test
          EOF

      - name: Deploy to production server (via SSH)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            DOCKER_CMD=(docker)
            if ! docker info >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1 && sudo -n docker info >/dev/null 2>&1; then
                DOCKER_CMD=(sudo docker)
              else
                echo "Docker daemon is not accessible for ${USER}."
                echo "Grant docker access (usermod -aG docker ${USER}) or allow passwordless sudo for docker."
                exit 1
              fi
            fi

            echo "Logging in to Docker Hub"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | "${DOCKER_CMD[@]}" login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            export DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/yatuk-app:latest"
            echo "Deploying image: ${DOCKER_IMAGE}"
            "${DOCKER_CMD[@]}" pull "${DOCKER_IMAGE}"
            "${DOCKER_CMD[@]}" compose -f docker-compose.prod.yml up -d
            "${DOCKER_CMD[@]}" image prune -f