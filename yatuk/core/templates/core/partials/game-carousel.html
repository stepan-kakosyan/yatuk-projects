<div class="w-100 game-carousel"> 
    <div class="swiper">
      <div class="swiper-wrapper">
          {% for g in games %}
            <a href="https://canvas.yatuk.am/hy/game/{{g.author.slug}}/{{g.slug}}-{{g.id}}/" target="_blank"
            class="photo-card position-relative photo-game-card swiper-slide" 
            style="background-image: url('https://cms.yatuk.am{{g.optimized.url}}'); background-position: {{g.background_position}};">
              <div class="photo-name d-flex">
                  <div class="game-author">
                      <img  loading="lazy" src="https://cms.yatuk.am{{g.author.main_image.url}}" alt="{{g.author.name}}"/>
                  </div>
                  <div class="d-flex flex-column text-left p-1 justify-content-end">
                      <span>{{g.name}}</span>
                      <b>{{g.author.name}}</b>
                  </div>
              </div>
            </a>  
          {% endfor %}
      </div>
      <div class="swiper-pagination"></div>
  </div> 
</div>
