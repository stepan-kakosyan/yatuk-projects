{% load static %}
{% load i18n %}
    <div class="music-card">
        <div class="iphone neu light-card">
          <div class="title">
            <div>{% translate "Yatuk Music" %}</div>
          </div>
          <div class="album-cover">
            <div class="music-album-image">
            <img src="https://cms.yatuk.am{{ song.author.middle_optimized.url }}" alt="{{song.title}}">
            </div>
            <h5 class="artist-title">
                {{song.author.name}}
            </h5>
            <h3 class="song-title">
              {{song.title}}
            </h3>

          </div>
          <div class="buttons">
                <button class="btn lg" 
                hx-get="{% url 'music' %}?id={{song.prev_id}}" 
                hx-target=".music-card" 
                hx-swap="outerHTML" 
                hx-trigger="click"><i class="fa fa-backward"></i></button>
                <button class="btn lg"><a target="_blank" href="https://play.yatuk.am/hy/music/{{song.author.slug}}/{{song.slug}}"><i class="fa fa-play"></i></a></button>
                <button class="btn lg" 
                hx-get="{% url 'music'  %}?id={{song.next_id}}" 
                hx-target=".music-card" 
                hx-swap="outerHTML" 
                hx-trigger="click"><i class="fa fa-forward"></i></button>
            </div>

        </div>
      </div>
