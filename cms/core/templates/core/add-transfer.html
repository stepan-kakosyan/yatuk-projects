{% load i18n %}
<div class="col-lg-12 grid-margin stretch-card">
  <div class="card">
    <div class="card-body" id="main_section_table">
      <div class="page-header">
        <h3 class="page-title">{% translate "New Transfer" %}</h3>
      </div>
      <form action="{% url 'add_transfer' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input  type="submit" class="btn btn-outline-success btn-fw" value="Պահպանել">
      </form>
    </div>
  </div>
</div>
