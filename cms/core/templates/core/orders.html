
{% extends "base/base.html" %}
{% load i18n %}
{% load static %}
{% block title %} {% translate "Orders" %}{% endblock %}
-
{% block additional_metas %}{% endblock %}
{% block content %}
  <div class="col-lg-12 grid-margin stretch-card">
    <div class="card">
      <div class="card-body" id="main_section_table">
        <div class="page-header">
          <h3 class="page-title">{% translate "Orders" %}</h3>
        </div>
          <p>
            <button type="button" class="btn btn-outline-info btn-icon-text" data-toggle="collapse"
              data-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample">{% translate "Filters" %} <i
                class="mdi mdi-filter"></i>
            </button>
          </p>
          <div class="collapse {% if status != "all" or prod != "all" %}show{% endif %}" id="collapseExample">
            <div class="d-flex flex-wrap">
              <div class="form-group m-2 col-12 col-lg-3 col-md-6">
                <label for="exampleFormControlSelect2">{% translate "Status" %}</label>
                <select class="form-control" id="selectStatus" hx-get="{% url 'orders' %}" hx-swap="innerHTML"
                  hx-target="#order-table" hx-trigger="change" push-url="true" hx-push-url="true" hx-indicator="#spinner"
                  hx-vals="js:{status: document.getElementById('selectStatus').value, prod: document.getElementById('selectProduct').value}">
                  <option value="all" {% if status == "all" %}selected{% endif %}>{% translate "All" %}</option>
                  {% for status_ in statuses %}
                    <option value="{{status_.value}}" {% if status == status_.value %}selected{% endif %}>{{status_.name}}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="form-group m-2 col-12 col-lg-3 col-md-6">
                <label for="exampleFormControlSelect2">{% translate "Product" %}</label>
                <select class="form-control" id="selectProduct" hx-get="{% url 'orders' %}" hx-swap="innerHTML"
                  hx-target="#order-table" hx-trigger="change" push-url="true" hx-push-url="true" hx-indicator="#spinner"
                  hx-vals="js:{status: document.getElementById('selectStatus').value, prod: document.getElementById('selectProduct').value}">
                  <option value="all" {% if prod == "all" %}selected{% endif %}>{% translate "All" %}</option>
                  {% for product in products %}
                  <option value="{{product.id}}" {% if prod == product.id %}selected{% endif %}>{{product.title}}</option>
                  {% endfor %}
                </select>
              </div>

            </div>
          </div>
      </div>
      <div class="table-responsive orders-list" id="order-table">
        {% include "core/partials/orders-table.html" %}
      </div>
    </div>
  </div>
{% endblock %}
