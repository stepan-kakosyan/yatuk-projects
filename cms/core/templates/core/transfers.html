{% extends "base/base.html" %}
{% load i18n %}
{% load static %}
{% block title %}{% translate "Transfers" %} {% endblock %}
-
{% block additional_metas %}{% endblock %}
{% block content %}
<div class="col-lg-12 grid-margin stretch-card">
  <div class="card">
    <div class="card-body" id="main_section_table">
      <div class="page-header">
        <h3 class="page-title">{% translate "Transfers" %}</h3>
        <button type="button" class="btn btn-outline-success btn-fw" hx-get={% url 'add_transfer' %} hx-swap="outerHTML"
          hx-target="#main_section_table">{% translate "New Transfer" %}</button>
      </div>
      <p>
        <button type="button" class="btn btn-outline-info btn-icon-text" data-toggle="collapse"
          data-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample"> {% translate "Filters" %} <i
            class="mdi mdi-filter"></i>
        </button>

      </p>
      <div class="collapse {% if prod != "all" or coll != "all" %}show{% endif %}" id="collapseExample">
        <div class="d-flex flex-wrap">
          <div class="form-group m-2 col-12 col-lg-3 col-md-6">
            <label for="exampleFormControlSelect2">{% translate "Product" %}</label>
            <select class="form-control" id="selectProduct" hx-get="{% url 'transfers' %}" hx-swap="innerHTML"
              hx-target="#transfer-table" hx-trigger="change" push-url="true" hx-push-url="true" hx-indicator="#spinner"
              hx-vals="js:{coll: document.getElementById('selectColl').value, prod: document.getElementById('selectProduct').value}">
              <option value="all" {% if prod == "all" %}selected{% endif %}>{% translate "All" %}</option>
              {% for product in products %}
              <option value="{{product.id}}" {% if prod == product.id %}selected{% endif %}>{{product.title}}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group m-2 col-12 col-lg-3 col-md-6">
            <label for="exampleFormControlSelect2">{% translate "Collaborator" %}</label>
            <select class="form-control" id="selectColl" hx-get="{% url 'transfers' %}" hx-swap="innerHTML"
              hx-target="#transfer-table" hx-trigger="change" hx-push-url="true" hx-indicator="#spinner"
              hx-vals="js:{coll: document.getElementById('selectColl').value, prod: document.getElementById('selectProduct').value}">
              <option value="all" {% if coll == "all" %}selected{% endif %}>{% translate "All" %}</option>
              {% for coll_ in collabarators %}
              <option value="{{coll_.id}}" {% if coll == coll_.id %}selected{% endif %}>{{coll_.title}}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="table-responsive" id="transfer-table">
        {% include "core/partials/transfer-table.html" %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
